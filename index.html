<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Carolanne Gay's personal links page." />
    <title>Carolanne Gay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <main class="page-shell" id="main-content">
      <button
        class="theme-toggle"
        id="theme-toggle"
        type="button"
        aria-label="Toggle color theme"
        aria-pressed="false"
      >
        <span class="theme-icon" aria-hidden="true">☾</span>
        <span class="visually-hidden theme-label">Switch to dark mode</span>
      </button>

      <section class="card" aria-labelledby="name-heading">
        <div class="profile-photo" aria-hidden="true">
          <img src="assets/profile-placeholder.svg" alt="" />
        </div>

        <h1 id="name-heading">Carolanne Gay</h1>
        <p class="job-title">Product Strategist</p>
        <p class="tagline">
          Mother, sourdough enthusiast, delinquent yogi, and devoted to a good cup of tea.
        </p>

        <nav class="links" aria-label="Primary links">
          <a
            class="link-button"
            href="https://www.linkedin.com/in/carolanne-murphy-gay/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span>LinkedIn</span>
            <span class="link-detail">Connect with me</span>
          </a>
          <a class="link-button" href="mailto:carolanne.gay@slalom.com">
            <span>Email</span>
            <span class="link-detail">Say hello</span>
          </a>
        </nav>
      </section>
    </main>

    <p class="visually-hidden" id="theme-status" aria-live="polite"></p>
    <script src="script.js"></script>
  </body>
</html>
